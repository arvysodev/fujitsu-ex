spring:
  application:
    name: delivery-fee-calculator

  datasource:
    url: jdbc:h2:mem:delivery_fee_db
    driver-class-name: org.h2.Driver
    username: sa
    password:

    h2:
      console:
        enabled: true
        path: /h2-console

    jpa:
      hibernate:
        ddl-auto: validate
      open-in-view: false
      properties:
        hibernate:
          format_sql: true

    flyway:
      enabled: true
